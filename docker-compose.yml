services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app/logs:/app/app/logs
    env_file:
      - .env
    depends_on:
      - qdrant
    environment:
      - QDRANT_URL=http://qdrant:6333

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data: